upstream frontend_upstream {
    server frontend:3000;
}

upstream backend_upstream {
    server backend:1337;
}

# HTTP -> HTTPS redirect (also serves ACME challenge for certbot)
server {
    listen 80;
    server_name baikal-guide.ru www.baikal-guide.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name baikal-guide.ru www.baikal-guide.ru;

    # Mount certs via the nginx volume (see docker-compose.yml)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # Strapi API + admin + uploads
    location /api/ {
        proxy_pass http://backend_upstream/api/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
    location /admin/ {
        proxy_pass http://backend_upstream/admin/;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
    location /uploads/ {
        proxy_pass http://backend_upstream/uploads/;
        proxy_cache_valid 200 30d;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Next.js frontend
    location / {
        proxy_pass http://frontend_upstream;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}
